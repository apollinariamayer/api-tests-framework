[pytest]
# Настройки pytest

# Путь к папке с тестами
testpaths = tests

# Маркеры для запуска отдельных групп
markers =
    smoke: Дымовые тесты
    regression: Регрессионные тесты
    api: API тесты

# Параметры командной строки по умолчанию
addopts = -v -s --tb=short --strict-markers

# Папка для отчётов
log_cli = true
log_cli_level = INFO